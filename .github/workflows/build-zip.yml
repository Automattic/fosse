name: Build zip

on:
    release:
        types: [published]
    push:
        branches:
            - trunk
    workflow_dispatch:

concurrency:
    group: build-zip-${{ github.event_name }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    build:
        name: Build plugin zip
        runs-on: ubuntu-24.04
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  coverage: none
                  tools: composer:v2

            - name: Build zip
              run: composer run-script build-zip

            - name: Attach zip to release
              if: github.event_name == 'release'
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.event.release.tag_name }}
              run: gh release upload "$TAG" build/fosse.zip --clobber --repo "$GITHUB_REPOSITORY"

            - name: Refresh latest-trunk release
              if: github.event_name != 'release' && github.ref == 'refs/heads/trunk'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if gh release view latest-trunk --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                      gh release delete latest-trunk --yes --cleanup-tag --repo "$GITHUB_REPOSITORY"
                  fi
                  gh release create latest-trunk build/fosse.zip \
                      --repo "$GITHUB_REPOSITORY" \
                      --title "Latest trunk build" \
                      --notes "Automated build from trunk ($GITHUB_SHA). Not a stable release — tracks the tip of trunk." \
                      --prerelease \
                      --target "$GITHUB_SHA"
