name: Tests

on:
    pull_request:
    push:
        branches:
            - trunk

concurrency:
    group: tests-${{ github.event_name }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    phpunit:
        name: 'PHP ${{ matrix.php }} / WP ${{ matrix.wp }}'
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        continue-on-error: ${{ matrix.wp == 'trunk' }}

        strategy:
            fail-fast: false
            matrix:
                php: ['8.2', '8.3', '8.4', '8.5']
                wp: ['6.9', 'trunk']

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Install PHP
              uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
              with:
                  php-version: ${{ matrix.php }}
                  extensions: mbstring, dom, xml
                  coverage: none
                  tools: composer:v2

            - name: Determine composer cache directory
              run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> "$GITHUB_ENV"

            - name: Cache composer downloads
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ env.COMPOSER_CACHE_DIR }}
                  key: composer-${{ runner.os }}-php${{ matrix.php }}-wp${{ matrix.wp }}-${{ hashFiles('composer.json') }}
                  restore-keys: |
                      composer-${{ runner.os }}-php${{ matrix.php }}-wp${{ matrix.wp }}-
                      composer-${{ runner.os }}-php${{ matrix.php }}-

            - name: Select WordPress version
              run: |
                  case "${{ matrix.wp }}" in
                    trunk)
                      # Alias both packages to a version wordbless's roots/wordpress constraint accepts;
                      # roots/wordpress pulls roots/wordpress-no-content at an exact-matching version.
                      composer require --no-update --dev \
                        "roots/wordpress:dev-main as 7.0.999" \
                        "roots/wordpress-no-content:dev-main as 7.0.999"
                      ;;
                    *)
                      composer require --no-update --dev "roots/wordpress:^${{ matrix.wp }}"
                      ;;
                  esac

            - name: Composer update
              run: composer update --no-interaction --no-progress

            - name: Run PHPUnit
              run: composer run-script test-php

    jest:
        name: Jest
        runs-on: ubuntu-24.04
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Jest
              run: pnpm test
