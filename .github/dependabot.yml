version: 2
updates:
    - package-ecosystem: composer
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      labels:
          - Janitorial

    - package-ecosystem: composer
      directory: '/tools'
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      labels:
          - Janitorial

    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      labels:
          - Janitorial

    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: monthly
      labels:
          - Janitorial
